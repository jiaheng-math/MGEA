output_dir: results/backend_robustness_hotpot_colbert_graphswap
evaluation_mode: train_test
train_ratio: 0.8
num_folds: 5
random_seed: 42
top_k_values: [3, 5]
feature_correlation_mode: same_graph_dense_swap

datasets:
  - name: hotpot
    pairs:
      - name: colbert_hipporag
        dense_backend: colbertv2
        graph_backend: hipporag2
        routing_rows_path: results/study_hotpot_hipporag_colbert_500/routing_rows.jsonl
        metrics_json_path: results/study_hotpot_hipporag_colbert_500/metrics.json
      - name: colbert_lightrag
        dense_backend: colbertv2
        graph_backend: lightrag
        routing_rows_path: results/study_hotpot_lightrag_colbert_shared_500/routing_rows.jsonl
        metrics_json_path: results/study_hotpot_lightrag_colbert_shared_500/metrics.json
