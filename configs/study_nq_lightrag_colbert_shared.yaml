dataset_path: data/nq_dev_500_seed42_queries.json
shared_corpus_path: data/nq_dev_500_seed42_corpus.json
subset_size: 500
top_k_values: [3, 5]
label_top_k: 5
random_seed: 42
train_ratio: 0.8
output_dir: results/study_nq_lightrag_colbert_shared_500
