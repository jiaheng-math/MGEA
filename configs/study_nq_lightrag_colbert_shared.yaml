colbert_nbits: 2
colbert_partitions: 256
colbert_doc_maxlen: 220
colbert_query_maxlen: 64
colbert_kmeans_niters: 4
colbert_rebuild_index: false

lightrag_working_dir: lightrag_cache/nq_shared_500
